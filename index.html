<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>현관앞키친 대시보드</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-logo">🍳</span>
        <div>
          <h1 class="brand-name">현관앞키친</h1>
          <p class="brand-sub">Front Door Kitchen</p>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-item active" href="#">📊 대시보드</a>
        <a class="nav-item" href="#">🧾 주문 관리</a>
        <a class="nav-item" href="#">🍽️ 메뉴</a>
        <a class="nav-item" href="#">👥 고객</a>
        <a class="nav-item" href="#">⚙️ 설정</a>
      </nav>
      <div class="sidebar-foot">
        <p>오늘 영업 중 🟢</p>
      </div>
    </aside>

    <!-- 메인 -->
    <main class="main">
      <header class="topbar">
        <div>
          <h2 class="page-title">오늘의 현황</h2>
          <p class="page-date" id="todayDate"></p>
        </div>
        <div class="topbar-right">
          <div class="period-toggle" id="periodToggle">
            <button class="period-btn active" data-period="today">오늘</button>
            <button class="period-btn" data-period="week">이번 주</button>
            <button class="period-btn" data-period="month">이번 달</button>
          </div>
          <div class="clock" id="clock">--:--:--</div>
        </div>
      </header>

      <!-- 통계 카드 -->
      <section class="cards" id="statCards"></section>

      <!-- 차트 + 인기메뉴 -->
      <section class="grid-2">
        <div class="panel">
          <div class="panel-head">
            <h3>시간대별 주문</h3>
            <span class="panel-tag" id="chartTotal"></span>
          </div>
          <div class="chart" id="chart"></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h3>인기 메뉴 TOP 5</h3>
          </div>
          <ul class="menu-list" id="menuList"></ul>
        </div>
      </section>

      <!-- 최근 주문 -->
      <section class="panel">
        <div class="panel-head">
          <h3>최근 주문</h3>
          <input type="text" class="search" id="search" placeholder="🔍 주문번호·고객·메뉴 검색" />
        </div>
        <div class="table-wrap">
          <table class="orders">
            <thead>
              <tr>
                <th>주문번호</th>
                <th>고객</th>
                <th>메뉴</th>
                <th>금액</th>
                <th>상태</th>
                <th>시간</th>
              </tr>
            </thead>
            <tbody id="orderBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
